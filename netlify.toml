[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

# API-kald til Netlify Functions (holder API-noegler server-side)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback - alle andre ruter leverer index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security + charset headers
[[headers]]
  for = "/*"
  [headers.values]
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(self)"

# Eksplicit charset for HTML (fix for browser encoding-problemer)
[[headers]]
  for = "/*.html"
  [headers.values]
  Content-Type = "text/html; charset=utf-8"

# Eksplicit charset for JavaScript-bundler
[[headers]]
  for = "/assets/*.js"
  [headers.values]
  Content-Type = "application/javascript; charset=utf-8"
