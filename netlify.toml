[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  LANG = "en_US.UTF-8"
  LC_ALL = "en_US.UTF-8"
  NODE_OPTIONS = "--max-old-space-size=4096"

[functions]
  node_bundler = "esbuild"

# API-kald til Netlify Functions (holder API-noegler server-side)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback - alle andre ruter leverer index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(self)"
